<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA ESFC iframe</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1600px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h2 {
      border-bottom: 2px solid #ccc;
      padding-bottom: 8px;
      margin-top: 40px;
    }
    section {
      margin-bottom: 40px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px 12px;
      text-align: left;
    }
    th {
      background-color: #f0f0f0;
    }
    pre {
      background: #f4f4f4;
      padding: 12px;
      border-radius: 4px;
      overflow-x: auto;
    }
    code {
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
    }
    blockquote {
      border-left: 4px solid #ccc;
      margin: 0;
      padding: 8px 16px;
      color: #666;
    }
    details {
      border: 1px solid #ccc;
      padding: 8px 12px;
      border-radius: 4px;
    }
    fieldset {
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 12px;
    }
    .color-box {
      width: 100px;
      height: 40px;
      display: inline-block;
      margin: 4px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

  <section>
    <h2>[PROD] External Share</h2>
    <br>
    <iframe
		width="100%" height=1200px
		src="https://confluence.external-share.com/content/893155/prod_iframe_test?unlock={jwt}"
		title="External Share (QA)"
		frameborder="0">
	</iframe>
  </section>


</body>
</html>
