<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/public-pages/favicon.png">
  <title>PROD ESFC iframe CUSTOM DOMAIN</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1600px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h2 {
      border-bottom: 2px solid #ccc;
      padding-bottom: 8px;
      margin-top: 40px;
    }
    section {
      margin-bottom: 40px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px 12px;
      text-align: left;
    }
    th {
      background-color: #f0f0f0;
    }
    pre {
      background: #f4f4f4;
      padding: 12px;
      border-radius: 4px;
      overflow-x: auto;
    }
    code {
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
    }
    blockquote {
      border-left: 4px solid #ccc;
      margin: 0;
      padding: 8px 16px;
      color: #666;
    }
    details {
      border: 1px solid #ccc;
      padding: 8px 12px;
      border-radius: 4px;
    }
    fieldset {
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 12px;
    }
    .color-box {
      width: 100px;
      height: 40px;
      display: inline-block;
      margin: 4px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

  <section>
    <h2>[PROD] External Share but the link is with custom domain <br> (for this to work, the custom domain option has to be enabled in PROD ESFC global settings)</h2>
    <br>
    <iframe
		width="100%" height=1200px
		src="https://esfcprod.wdtest.uk/content/485cfc51-5d62-4931-b577-e0ae6f4390ba"
		title="External Share (PROD) custom domain"
		frameborder="0">
	</iframe>
  </section>


</body>
</html>
